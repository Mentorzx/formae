name: Release Extension

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.19.0

      - name: Run extension contract tests
        run: node --test apps/extension/src/*.test.js

      - name: Verify reproducible Chrome and Firefox packaging
        run: node scripts/verify-extension-release.mjs

      - name: Audit packaged extension contents
        run: node scripts/audit-extension-package.mjs

      - name: Package release artifacts
        run: node scripts/package-extension.mjs

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: formae-extension-release
          path: dist/releases/*

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/releases/*
          generate_release_notes: true
