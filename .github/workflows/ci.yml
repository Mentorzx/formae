name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.19.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          package-manager-cache: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
          components: clippy,rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Cargo tests
        run: cargo test --workspace

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build WASM
        run: pnpm build:wasm

  private-sync-contracts:
    name: Private Sync Offline Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/private-sync-e2e

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.19.0
          cache: pnpm
          cache-dependency-path: infra/private-sync-e2e/pnpm-lock.yaml
          package-manager-cache: false

      - name: Install private sync harness dependencies
        run: pnpm install --frozen-lockfile

      - name: Replay redacted private SIGAA fixture contracts
        run: pnpm replay

      - name: Install Playwright Chromium for offline replay
        run: pnpm exec playwright install --with-deps chromium

      - name: Run browser-side selector drift alarms
        run: pnpm exec tsx --test tests/sanitize.test.ts tests/privateFixtureReplay.test.ts tests/private-contract-replay.test.ts

      - name: Typecheck private sync harness
        run: pnpm typecheck

      - name: Surface selector drift alarm
        if: failure()
        run: |
          echo "::error title=SIGAA contract drift alarm::Offline private sync replay failed. Investigate redacted fixture drift or browser-side contract breakage in infra/private-sync-e2e/src/privateFixtureReplay.ts and infra/private-sync-e2e/src/sigaa.ts."
