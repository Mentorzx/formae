<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>UFBA SIM - Codigos de horario no SIGAA</title>
  </head>
  <body>
    <!-- Source reference: https://ufbasim.ufba.br/hor%C3%A1rios-de-aula-c%C3%B3digos-na-tabela-de-hor%C3%A1rios-do-sigaa -->
    <main>
      <h1>Como entender os horarios do SIGAA</h1>
      <p>Dia(s) + Turno + Horario(s).</p>
      <table>
        <tr><th>Dia</th><th>Codigo</th></tr>
        <tr><td>Segunda</td><td>2</td></tr>
        <tr><td>Terca</td><td>3</td></tr>
        <tr><td>Quarta</td><td>4</td></tr>
        <tr><td>Quinta</td><td>5</td></tr>
        <tr><td>Sexta</td><td>6</td></tr>
        <tr><td>Sabado</td><td>7</td></tr>
      </table>
      <p>Exemplos: 35N12, 2M12, 3M23 5T23.</p>
    </main>
  </body>
</html>
